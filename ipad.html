<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #D2B48C;
        }

        .cabecalho {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid white;
            border-radius: 10px;
        }

        .prod {
            margin: 10px;
            display: flex;
        }

        img {
            border: 1px solid white;
            border-radius: 10px;
        }

        .inf1 {
            display: flex;
            flex-direction: column;
        }

        .inf {
            margin: 10px;
            display: flex;
            flex-direction: column;
        }

        .tamanho {
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            margin: 5px;
            border: 1px solid white;
            border-radius: 10px;
            width: 100px;
            height: 100px;
        }

        hr {
            border: 1px solid white;
        }

        .tamanhos {
            flex-direction: column;
            display: flex;
            margin: 5px;
        }

        .hrin {
            border: 1px solid white;
            width: 99px;
        }

        .tamanhos2 {
            display: flex;
            flex-direction: row;
        }
    </style>
</head>

<body>
    <div class="cabecalho">
        <h1><u>Apple 2024 iPad Pro de 11 polegadas (Wi-Fi, de 256 GB, Vidro convencional) - Preto-espacial (M4)</u></h1>
    </div>
    <div class="prod">
        <img src="https://m.media-amazon.com/images/I/51OfJptaYBL._AC_SX679_.jpg" alt="">

        <div class="inf">
            <h1>Apple 2024 iPad Pro de 11 polegadas (Wi-Fi, de 256 GB, Vidro convencional) - Preto-espacial (M4) </h1>
            <hr>
            <h2> tamanhos:</h2>
            <div class="tamanhos">
                <div class="tamanhos2">

                    <div class="tamanho">
                        256
                        <hr class="hrin">
                        R$12.499,00
                    </div>
                    <div class="tamanho">
                        512
                        <hr class="hrin">
                        R$13.409,09
                    </div>
                    <div class="tamanho">
                        1tb
                        <hr class="hrin">
                        R$15.454,80
                    </div>
                    <div class="tamanho">
                        2tb
                        <hr class="hrin">
                        R$19.126,80
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
